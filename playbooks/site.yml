---
- hosts: all
- import_playbook: ../static-assignments/common-del.yml
- name: Configuracion basica del servidor bastion (localhost)
  hosts: local
  become: yes
  gather_facts: yes

  tasks:
    - name: Actualizar cache de apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar paquetes esenciales
      apt:
        name:
          - curl
          - vim
          - htop
          - git
          - unzip
          - net-tools
        state: present

    - name: Crear directorio de aplicacion
      file:
        path: /opt/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Configurar zona horaria
      timezone:
        name: UTC

    - name: Asegurar que el servicio SSH esta corriendo
      service:
        name: ssh
        state: started
        enabled: yes

    - name: Mostrar mensaje de confirmacion
      debug:
        msg: "¡Servidor bastion configurado correctamente con Ansible!"
