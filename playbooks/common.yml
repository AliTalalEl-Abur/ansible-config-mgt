---
- name: Configuracion basica de servidores
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Actualizar cache de apt
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instalar paquetes esenciales
      apt:
        name:
          - curl
          - vim
          - htop
          - git
          - unzip
        state: present

    - name: Crear directorio de aplicacion
      file:
        path: /opt/app
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Configurar zona horaria
      timezone:
        name: UTC

    - name: Asegurar que el servicio SSH esta corriendo
      service:
        name: ssh
        state: started
        enabled: yes

- name: Configuracion especifica para servidores web
  hosts: webservers
  become: yes

  tasks:
    - name: Instalar Nginx
      apt:
        name: nginx
        state: present

    - name: Iniciar y habilitar Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Crear pagina de prueba
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <head><title>Servidor Configurado por Ansible</title></head>
            <body>
              <h1>Hola! Este servidor fue configurado automaticamente con Ansible</h1>
              <p>Servidor: {{ inventory_hostname }}</p>
              <p>Fecha: {{ ansible_date_time.iso8601 }}</p>
            </body>
          </html>
        owner: www-data
        group: www-data
        mode: '0644'

- name: Configuracion especifica para servidores de base de datos
  hosts: dbservers
  become: yes

  tasks:
    - name: Instalar MySQL Server
      apt:
        name: mysql-server
        state: present

    - name: Iniciar y habilitar MySQL
      service:
        name: mysql
        state: started
        enabled: yes
